<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Sania231 - Task 1</title>
        <style>.block { background-color:gainsboro; padding:1em; } </style>
    </head>
    <body>
        <h1>Sania231 - Task 1</h1>
        <h2>My code:</h2>
        <p id="code" class="block"></p>
        <h2>Results of my code:</h2>
        <p id="results" class="block"></p>
        <script id="task_id">
            // {# INPUT #}
            let data = [
                {"page_id": 6682420, "creation_date": "2021-09-13", "title": "André Baniwa"},
                {"page_id": 4246775, "creation_date": "2013-12-10", "title": "Benki Piyãko"},
                {"page_id": 5882073, "creation_date": "2018-12-03", "title": "Célia Xakriabá"},
                {"page_id": 6977673, "creation_date": "2022-10-05", "title": "Chirley Pankará"},
                {"page_id": 7069044, "creation_date": "2023-02-16", "title": "Cristine Takuá"},
                {"page_id": 2119511, "creation_date": "2009-01-28", "title": "Eliane Potiguara"},
                {"page_id": 6714407, "creation_date": "2021-10-09", "title": "Jaider Esbell"},
                {"page_id": 6977117, "creation_date": "2022-10-04", "title": "Jerônimo Rodrigues"},
                {"page_id": 6935831, "creation_date": "2022-08-02", "title": "Nanblá Gakran"},
                {"page_id": 4908665, "creation_date": "2015-11-13", "title": "Sônia Guajajara"},
                {"page_id": 5886895, "creation_date": "2018-12-12", "title": "Vãngri Kaingáng"},
                {"page_id": 6549130, "creation_date": "2021-04-10", "title": "Zezico Guajajara"},
            ];

            // {# YOUR CODE HERE #}
            // Get the element where results will be shown
            const resultsElement = document.getElementById("results");

            // List of month names to convert numeric month to readable format
            const monthNames = [
                "January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"
            ];

            /* * Note on AI: I asked an AI for the best way to handle dates. 
             * It warned me that using new Date() might show the wrong day 
             * depending on the user's timezone. So, I split the string 
             * manually below to make sure the dates stay exactly as written.
             */
            // Loop through each article in the data and format the string as required
            data.forEach(item => {
                // Split the date string manually to avoid timezone bugs
                const dateParts = item.creation_date.split("-");
                const year = dateParts[0];
                
                // Subtract 1 because arrays start at index 0 and convert month number to month name
                const month = monthNames[parseInt(dateParts[1]) - 1]; 
                
                // parseInt removes any leading zeros (like turning '09' into 9)
                const day = parseInt(dateParts[2]); 

                // Put the sentence together
                const formattedString = `Article "${item.title}" (Page ID ${item.page_id}) was created at ${month} ${day}, ${year}.`;

                // Add the result to the page
                const paragraph = document.createElement("p");
                paragraph.textContent = formattedString;
                resultsElement.appendChild(paragraph);
            });
        </script>
        <script>
            document.getElementById("code").innerText = document.getElementById("task_id").text;
        </script>
    </body>
</html>
